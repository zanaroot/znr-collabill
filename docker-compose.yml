services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: collabill_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - collabill_pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - collabill_miniodata:/data

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 admin password;
      mc mb myminio/my-buckets || true;
      mc anonymous set download myminio/my-buckets;
      exit 0;
      "

volumes:
  collabill_pgdata:
  collabill_miniodata: