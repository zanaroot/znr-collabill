name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy"
        required: true
        default: "latest"

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository }}
  MIGRATOR_IMAGE_NAME: ${{ github.repository }}-migrator
  DEPLOY_PATH: /var/docker-infra

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Deploy to droplet
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          APP_IMAGE: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ inputs.image_tag }}
          MIGRATOR_IMAGE: ${{ env.REGISTRY }}/${{ env.MIGRATOR_IMAGE_NAME }}:${{ inputs.image_tag }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: APP_IMAGE,MIGRATOR_IMAGE,DEPLOY_PATH,GHCR_USERNAME,GHCR_READ_TOKEN
          script_stop: true
          script: |
            set -eu

            cd "$DEPLOY_PATH"

            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            export NEXT_IMAGE="$APP_IMAGE"
            export MIGRATOR_IMAGE="$MIGRATOR_IMAGE"

            docker compose \
              -p collabill-prod \
              -f docker-compose.prod.yml \
              --env-file .env \
              --profile migrate \
              pull next migrator

            docker compose \
              -p collabill-prod \
              -f docker-compose.prod.yml \
              --env-file .env \
              --profile migrate \
              run --rm migrator

            docker compose \
              -p collabill-prod \
              -f docker-compose.prod.yml \
              --env-file .env \
              up -d

            docker image prune -af --filter "until=168h"
