name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /var/docker-infra

jobs:
  validate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/collabill_db
      NEXT_PUBLIC_S3_ENDPOINT: http://localhost:9000
      MINIO_ROOT_USER: user
      MINIO_ROOT_PASSWORD: password
      S3_ENDPOINT: http://localhost:9000
      ENCRYPTION_KEY: CI_ENCRYPTION_KEY_12345678901234567890123456789012
      S3_ACCESS_KEY: user
      S3_SECRET_KEY: password
      S3_BUCKET: my-buckets
      S3_REGION: us-east-1
      BREVO_API_KEY: CI_BREVO_API_KEY_12345678901234567890123456789012
      MAIL_FROM: MAIL_FROM_@CI.COM

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Biome Lint
        run: pnpm lint

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test:unit

  build:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          target: runner
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_S3_ENDPOINT=${{ vars.NEXT_PUBLIC_S3_ENDPOINT }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          NEXT_IMAGE: ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ github.sha }}
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: NEXT_IMAGE,DEPLOY_PATH,GHCR_USERNAME,GHCR_READ_TOKEN
          script_stop: true
          script: |
            #!/bin/bash
            set -eu

            # Create deploy directory if it doesn't exist
            mkdir -p "$DEPLOY_PATH"

            # Generate .env file with restrictive permissions
            umask 077
            cat > "$DEPLOY_PATH/.env.tmp" << 'ENVEOF'
            NEXT_IMAGE=${NEXT_IMAGE}

            # Build-time env (used for reference)
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_S3_ENDPOINT=${{ vars.NEXT_PUBLIC_S3_ENDPOINT }}

            # Runtime env - Non-secrets
            POSTGRES_DB=${{ vars.POSTGRES_DB }}
            POSTGRES_USER=${{ vars.POSTGRES_USER }}
            MINIO_ROOT_USER=${{ vars.MINIO_ROOT_USER }}
            S3_ACCESS_KEY=${{ vars.S3_ACCESS_KEY }}
            S3_BUCKET=${{ vars.S3_BUCKET }}
            S3_REGION=${{ vars.S3_REGION }}
            S3_ENDPOINT=${{ vars.S3_ENDPOINT }}
            MAIL_FROM=${{ vars.MAIL_FROM }}

            # Runtime env - Secrets
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
            S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
            ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
            BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
            ENVEOF

            # Atomic move with correct permissions
            chmod 600 "$DEPLOY_PATH/.env.tmp"
            mv "$DEPLOY_PATH/.env.tmp" "$DEPLOY_PATH/.env"

            cd "$DEPLOY_PATH"

            # Login to GHCR
            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            # Pull the new image
            docker compose \
              -p collabill-prod \
              -f docker-compose.prod.yml \
              --env-file .env \
              pull next

            # Restart the stack
            docker compose \
              -p collabill-prod \
              -f docker-compose.prod.yml \
              --env-file .env \
              up -d --remove-orphans

            # Prune old images (keep images from last 7 days)
            docker image prune -af --filter "until=168h" || true
