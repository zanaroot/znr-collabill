name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production

env:
  REGISTRY: ghcr.io
  APP_IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /var/docker-infra

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to GHCR
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          file: ./Dockerfile
          target: runner
          build-args: |
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_S3_ENDPOINT=${{ vars.NEXT_PUBLIC_S3_ENDPOINT }}
            SKIP_SERVER_ENV_VALIDATION=1
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare deploy payload
        run: |
          DEPLOY_PAYLOAD_B64="$(tar -czf - docker-compose.prod.yml nginx | base64 -w 0)"
          echo "DEPLOY_PAYLOAD_B64=$DEPLOY_PAYLOAD_B64" >> "$GITHUB_ENV"

      - name: Prepare env payload
        run: |
          cat > deploy.env <<EOF
          NEXT_IMAGE=${{ env.REGISTRY }}/${{ env.APP_IMAGE_NAME }}:${{ github.sha }}
          NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_S3_ENDPOINT=${{ vars.NEXT_PUBLIC_S3_ENDPOINT }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          MINIO_ROOT_USER=${{ vars.MINIO_ROOT_USER }}
          S3_ACCESS_KEY=${{ vars.S3_ACCESS_KEY }}
          S3_BUCKET=${{ vars.S3_BUCKET }}
          S3_REGION=${{ vars.S3_REGION }}
          S3_ENDPOINT=${{ vars.S3_ENDPOINT }}
          MAIL_FROM=${{ vars.MAIL_FROM }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          EOF
          ENV_PAYLOAD_B64="$(base64 -w 0 deploy.env)"
          rm -f deploy.env
          echo "ENV_PAYLOAD_B64=$ENV_PAYLOAD_B64" >> "$GITHUB_ENV"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          DEPLOY_PAYLOAD_B64: ${{ env.DEPLOY_PAYLOAD_B64 }}
          ENV_PAYLOAD_B64: ${{ env.ENV_PAYLOAD_B64 }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: DEPLOY_PATH,GHCR_USERNAME,GHCR_READ_TOKEN,DEPLOY_PAYLOAD_B64,ENV_PAYLOAD_B64
          script_stop: true
          script: |
            #!/bin/bash
            set -Eeuo pipefail

            mkdir -p "$DEPLOY_PATH"

            echo "$DEPLOY_PAYLOAD_B64" | base64 -d > "$DEPLOY_PATH/deploy.tgz"
            tar -xzf "$DEPLOY_PATH/deploy.tgz" -C "$DEPLOY_PATH"
            rm -f "$DEPLOY_PATH/deploy.tgz"

            umask 077
            echo "$ENV_PAYLOAD_B64" | base64 -d > "$DEPLOY_PATH/.env.tmp"
            chmod 600 "$DEPLOY_PATH/.env.tmp"
            mv "$DEPLOY_PATH/.env.tmp" "$DEPLOY_PATH/.env"

            cd "$DEPLOY_PATH"

            export DRONE_SSH_PREV_COMMAND_EXIT_CODE=0
            set -a
            . ./.env
            set +a

            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            docker pull "$NEXT_IMAGE"

            docker compose \
              -p collabill-prod \
              -f docker-compose.prod.yml \
              --env-file .env \
              up -d --remove-orphans

            docker image prune -af --filter "until=168h" || true
