name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        required: true
        default: "production"
        type: choice
        options:
          - production
      deploy_path:
        description: "Absolute path on the server where the app is checked out"
        required: false
        default: "/app"
        type: string
      branch:
        description: "Git branch to deploy"
        required: false
        default: "main"
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    steps:
      - name: Prepare env payload
        env:
          DEPLOY_PATH: ${{ inputs.deploy_path }}
          REPO_BRANCH: ${{ inputs.branch }}
        run: |
          cat > deploy.env <<EOF
          DEPLOY_PATH=$DEPLOY_PATH
          REPO_URL=git@github.com:${{ github.repository }}.git
          REPO_BRANCH=$REPO_BRANCH
          NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_S3_ENDPOINT=${{ vars.NEXT_PUBLIC_S3_ENDPOINT }}
          NEXT_PUBLIC_SENTRY_DSN=${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          POSTGRES_DB=${{ vars.POSTGRES_DB }}
          POSTGRES_USER=${{ vars.POSTGRES_USER }}
          MINIO_ROOT_USER=${{ vars.MINIO_ROOT_USER }}
          S3_ACCESS_KEY=${{ vars.S3_ACCESS_KEY }}
          SENTRY_DSN=${{ vars.SENTRY_DSN }}
          S3_BUCKET=${{ vars.S3_BUCKET }}
          S3_REGION=${{ vars.S3_REGION }}
          S3_ENDPOINT=${{ vars.S3_ENDPOINT }}
          MAIL_FROM=${{ vars.MAIL_FROM }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}
          EOF
          ENV_PAYLOAD_B64="$(base64 -w 0 deploy.env)"
          rm -f deploy.env
          echo "ENV_PAYLOAD_B64=$ENV_PAYLOAD_B64" >> "$GITHUB_ENV"

      - name: Deploy to server
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          ENV_PAYLOAD_B64: ${{ env.ENV_PAYLOAD_B64 }}
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: ENV_PAYLOAD_B64
          command_timeout: 30m
          script_stop: true
          script: |
            #!/bin/bash
            set -Eeuo pipefail

            trap 'echo "::error::Deployment failed at line ${LINENO}" >&2' ERR

            echo "============================================================"
            echo "Step 1/5: Load configuration from env payload"
            echo "============================================================"
            umask 077
            ENV_FILE="$(mktemp)"
            echo "$ENV_PAYLOAD_B64" | base64 -d > "$ENV_FILE"
            # shellcheck disable=SC1090
            set -a
            . "$ENV_FILE"
            set +a
            rm -f "$ENV_FILE"

            : "${DEPLOY_PATH:?DEPLOY_PATH is required}"
            : "${REPO_URL:?REPO_URL is required}"
            : "${REPO_BRANCH:?REPO_BRANCH is required}"

            echo "DEPLOY_PATH=$DEPLOY_PATH"
            echo "REPO_URL=$REPO_URL"
            echo "REPO_BRANCH=$REPO_BRANCH"

            echo "============================================================"
            echo "Step 2/5: Sync application code from Git"
            echo "============================================================"
            mkdir -p "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            if [ ! -d .git ]; then
              echo "No existing checkout found at $DEPLOY_PATH. Cloning fresh..."
              git clone "$REPO_URL" "$DEPLOY_PATH"
            else
              echo "Existing checkout found at $DEPLOY_PATH. Fetching latest..."
            fi

            git remote set-url origin "$REPO_URL"
            git fetch --all --prune
            git reset --hard "origin/$REPO_BRANCH"
            echo "HEAD is now at $(git rev-parse HEAD) on branch $REPO_BRANCH"

            echo "============================================================"
            echo "Step 3/5: Generate .env from GitHub Environment variables"
            echo "============================================================"
            umask 077
            ENV_TARGET="$DEPLOY_PATH/.env.tmp"
            echo "$ENV_PAYLOAD_B64" | base64 -d > "$ENV_TARGET"
            chmod 600 "$ENV_TARGET"
            mv "$ENV_TARGET" "$DEPLOY_PATH/.env"
            echo "Wrote $DEPLOY_PATH/.env with restrictive permissions."

            echo "============================================================"
            echo "Step 4/5: Stop currently running services"
            echo "============================================================"
            docker compose \
              -p collabill-prod \
              -f "$DEPLOY_PATH/docker-compose.prod.yml" \
              --env-file "$DEPLOY_PATH/.env" \
              down --remove-orphans || true

            echo "============================================================"
            echo "Step 5/5: Rebuild application and start all services"
            echo "============================================================"
            docker compose \
              -p collabill-prod \
              -f "$DEPLOY_PATH/docker-compose.prod.yml" \
              --env-file "$DEPLOY_PATH/.env" \
              build --no-cache

            docker compose \
              -p collabill-prod \
              -f "$DEPLOY_PATH/docker-compose.prod.yml" \
              --env-file "$DEPLOY_PATH/.env" \
              up -d --force-recreate --remove-orphans

            echo "============================================================"
            echo "Deployment completed successfully at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "============================================================"