services:
  postgres:
    image: postgres:17
    restart: always
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-collabill_db_prod}
      POSTGRES_USER: ${POSTGRES_USER:-admin_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password_prod}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin_prod} -d ${POSTGRES_DB:-collabill_db_prod}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: always
    env_file:
      - .env.prod
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin_prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password_prod}
    ports:
      - "${MINIO_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - minio_data_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    env_file:
      - .env.prod
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin_prod}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password_prod}
      S3_BUCKET: ${S3_BUCKET:-my-buckets}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 \"$MINIO_ROOT_USER\" \"$MINIO_ROOT_PASSWORD\";
      mc mb myminio/\"$S3_BUCKET\" || true;
      mc anonymous set download myminio/\"$S3_BUCKET\";
      exit 0;
      "

  next:
    build: .
    restart: always
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-admin_prod}:${POSTGRES_PASSWORD:-password_prod}@postgres:5432/${POSTGRES_DB:-collabill_db_prod}
      S3_ENDPOINT: http://minio:9000
      NEXT_PUBLIC_S3_ENDPOINT: ${NEXT_PUBLIC_S3_ENDPOINT:-http://localhost:9100}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-admin_prod}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-password_prod}
      S3_BUCKET: ${S3_BUCKET:-my-buckets}
      S3_REGION: ${S3_REGION:-us-east-1}
      NODE_ENV: ${NODE_ENV:-production}
      BREVO_API_KEY: ${BREVO_API_KEY}
      MAIL_FROM: ${MAIL_FROM}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - "${APP_PORT:-3022}:3000"

volumes:
  postgres_data_prod:
  minio_data_prod: