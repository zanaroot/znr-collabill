services:
  postgres:
    ports:
      - "5434:5432"

  minio:
    ports:
      - "9100:9000"
      - "9101:9001"

  next:
    build: .
    restart: always
    depends_on:
      - postgres
      - minio
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/collabill_db
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    ports:
      - "3022:3000"