name: collabill-prod

x-next-env: &next-env
  DATABASE_URL: ${DATABASE_URL}
  S3_ENDPOINT: ${S3_ENDPOINT}
  NEXT_PUBLIC_S3_ENDPOINT: ${NEXT_PUBLIC_S3_ENDPOINT}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION}
  NODE_ENV: production
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}

x-next-build-args: &next-build-args
  DATABASE_URL: ${DATABASE_URL}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
  NEXT_PUBLIC_S3_ENDPOINT: ${NEXT_PUBLIC_S3_ENDPOINT}
  NODE_ENV: production
  S3_ENDPOINT: ${S3_ENDPOINT}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
  S3_ACCESS_KEY: ${S3_ACCESS_KEY}
  S3_SECRET_KEY: ${S3_SECRET_KEY}
  S3_BUCKET: ${S3_BUCKET}
  S3_REGION: ${S3_REGION}
  ENCRYPTION_KEY: ${ENCRYPTION_KEY}

services:
  postgres:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9100:9000"
      - "9001:9001"
    volumes:
      - minio_data_prod:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      if [ \"$$S3_ACCESS_KEY\" != \"$$MINIO_ROOT_USER\" ]; then
      mc admin user add myminio \"$$S3_ACCESS_KEY\" \"$$S3_SECRET_KEY\";
      mc admin policy attach myminio readwrite --user \"$$S3_ACCESS_KEY\";
      fi;
      mc mb myminio/\"$$S3_BUCKET\" || true;
      mc anonymous set download myminio/\"$$S3_BUCKET\";
      exit 0;
      "

  next:
    image: ${NEXT_IMAGE:?NEXT_IMAGE is required}
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args: *next-build-args
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment: *next-env
    ports:
      - "3000:3000"

volumes:
  postgres_data_prod:
  minio_data_prod:
